name: Sync LLM leaderboard

on:
  schedule:
    # Every 3 hours on the hour (UTC). 8 runs/day.
    - cron: '0 */3 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-models
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Refresh LLM leaderboard + mirror to EN site
        run: python sync.py models whichclaw

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/models_ranking.json public/models_icons \
                  whichclaw/public/models_ranking.json whichclaw/public/models_icons
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit."
            exit 0
          fi
          git commit -m "data: auto-sync LLM leaderboard $(date -u +'%Y-%m-%d %H:%MZ')"
          git push origin main
