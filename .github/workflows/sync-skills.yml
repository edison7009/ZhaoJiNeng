name: Sync Skills Data

on:
  schedule:
    # Run every day at 03:00 UTC (11:00 Beijing time)
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest skills.json
        run: |
          curl -fsSL -o skills_new.json \
            "https://skillhub-1388575217.cos.ap-guangzhou.myqcloud.com/skills.json"

      - name: Check for changes
        id: diff
        run: |
          if ! diff -q skills.json skills_new.json > /dev/null 2>&1; then
            echo "changed=true" >> $GITHUB_OUTPUT
            SKILL_COUNT=$(python3 -c "import json; d=json.load(open('skills_new.json')); print(len(d.get('skills', d.get('data', []))))")
            echo "count=$SKILL_COUNT" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update skills.json
        if: steps.diff.outputs.changed == 'true'
        run: mv skills_new.json skills.json

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills.json
          git commit -m "chore: sync skills.json (${{ steps.diff.outputs.count }} skills)"
          git push
