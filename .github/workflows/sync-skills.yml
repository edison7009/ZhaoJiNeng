name: Sync Skills Data

on:
  schedule:
    # Run every day at 03:00 UTC (11:00 Beijing time)
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch skills from SkillHub API
        run: |
          API_BASE="https://lightmake.site"
          HEADERS='-H "Referer: https://skillhub.tencent.com/" -H "Origin: https://skillhub.tencent.com"'

          # Fetch featured (top 50) skills
          echo "Fetching top 50 featured skills..."
          TOP_JSON=$(eval curl -fsSL $HEADERS "$API_BASE/api/skills/top")
          TOP_CODE=$(echo "$TOP_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['code'])")
          if [ "$TOP_CODE" != "0" ]; then
            echo "ERROR: Top API returned code $TOP_CODE"
            exit 1
          fi
          FEATURED=$(echo "$TOP_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps([s['slug'] for s in d['data']['skills']]))")
          echo "Featured slugs: $(echo "$FEATURED" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")"

          # Fetch all skills page by page
          echo "Fetching all skills..."
          PAGE=1
          PAGE_SIZE=20
          ALL_SKILLS="[]"
          TOTAL=0

          while true; do
            RESP=$(eval curl -fsSL $HEADERS "$API_BASE/api/skills?page=$PAGE&size=$PAGE_SIZE")
            CODE=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['code'])")
            if [ "$CODE" != "0" ]; then
              echo "ERROR: API returned code $CODE on page $PAGE"
              break
            fi

            if [ "$PAGE" -eq 1 ]; then
              TOTAL=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['total'])")
              echo "Total skills: $TOTAL"
            fi

            # Append skills and check count
            RESULT=$(echo "$RESP" | python3 -c "
          import sys, json
          resp = json.load(sys.stdin)
          skills = resp['data']['skills']
          print(json.dumps(skills))
          print(len(skills), file=sys.stderr)
          ")
            COUNT=$(echo "$RESP" | python3 -c "import sys,json; print(len(json.load(sys.stdin)['data']['skills']))")

            ALL_SKILLS=$(python3 -c "
          import sys, json
          existing = json.loads(sys.argv[1])
          new_skills = json.loads(sys.argv[2])
          existing.extend(new_skills)
          print(json.dumps(existing))
          " "$ALL_SKILLS" "$RESULT")

            CURRENT=$(python3 -c "import sys,json; print(len(json.loads(sys.argv[1])))" "$ALL_SKILLS")

            if [ $((PAGE % 100)) -eq 0 ]; then
              echo "  Page $PAGE: $CURRENT / $TOTAL skills"
            fi

            if [ "$COUNT" -lt "$PAGE_SIZE" ]; then
              break
            fi

            PAGE=$((PAGE + 1))
            sleep 0.1
          done

          FINAL_COUNT=$(python3 -c "import sys,json; print(len(json.loads(sys.argv[1])))" "$ALL_SKILLS")
          echo "Total skills fetched: $FINAL_COUNT"

          # Build final JSON
          python3 -c "
          import sys, json
          from datetime import datetime, timezone

          featured = json.loads(sys.argv[1])
          all_skills = json.loads(sys.argv[2])

          categories = {
              'AI \u667a\u80fd': ['ai-intelligence'],
              '\u5f00\u53d1\u5de5\u5177': ['developer-tools'],
              '\u6548\u7387\u63d0\u5347': ['productivity'],
              '\u6570\u636e\u5206\u6790': ['data-analysis'],
              '\u5185\u5bb9\u521b\u4f5c': ['content-creation'],
              '\u5b89\u5168\u5408\u89c4': ['security-compliance'],
              '\u901a\u8baf\u534f\u4f5c': ['communication-collaboration']
          }

          transformed = []
          for s in all_skills:
              transformed.append({
                  'slug': s.get('slug', ''),
                  'name': s.get('name', ''),
                  'description': s.get('description', ''),
                  'description_zh': s.get('description_zh', ''),
                  'version': s.get('version', ''),
                  'homepage': s.get('homepage', ''),
                  'tags': s.get('tags') or [],
                  'downloads': int(s.get('downloads', 0)),
                  'stars': int(s.get('stars', 0)),
                  'installs': int(s.get('installs', 0)),
                  'updated_at': s.get('updated_at'),
                  'score': s.get('score', 0),
                  'owner': s.get('ownerName'),
                  'category': s.get('category', '')
              })

          result = {
              'total': len(transformed),
              'generated_at': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
              'featured': featured,
              'categories': categories,
              'skills': transformed
          }

          with open('skills_new.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False)

          print(f'Written {len(transformed)} skills to skills_new.json')
          " "$FEATURED" "$ALL_SKILLS"

      - name: Check for changes
        id: diff
        run: |
          NEW_COUNT=$(python3 -c "import json; d=json.load(open('skills_new.json')); print(len(d.get('skills', [])))")
          echo "New file has $NEW_COUNT skills"
          if [ "$NEW_COUNT" -lt 100 ]; then
            echo "ERROR: Too few skills ($NEW_COUNT), aborting"
            exit 1
          fi
          if ! diff -q skills.json skills_new.json > /dev/null 2>&1; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "count=$NEW_COUNT" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update skills.json
        if: steps.diff.outputs.changed == 'true'
        run: mv skills_new.json skills.json

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills.json
          git commit -m "chore: sync skills data (${{ steps.diff.outputs.count }} skills)"
          git push
