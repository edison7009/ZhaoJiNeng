name: Sync Skills Data

on:
  schedule:
    # Run every day at 03:00 UTC (11:00 Beijing time)
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover latest skills data URL from skillhub.tencent.com
        id: discover
        run: |
          # Fetch skillhub homepage and extract hashed JS bundle filename
          PAGE_HTML=$(curl -fsSL "https://skillhub.tencent.com/")
          JS_NAME=$(echo "$PAGE_HTML" | grep -oP 'skill-hub\.[A-Za-z0-9_-]+\.js' | head -1)
          if [ -z "$JS_NAME" ]; then
            echo "Could not find JS bundle name in page HTML"
            exit 1
          fi
          echo "Found JS bundle: $JS_NAME"

          # Fetch JS bundle and extract skills data hash
          JS_URL="https://cloudcache.tencent-cloud.com/qcloud/tea/app/assets/$JS_NAME"
          JS_TEXT=$(curl -fsSL "$JS_URL")
          DATA_HASH=$(echo "$JS_TEXT" | grep -oP 'skills\.[a-f0-9]+\.json' | head -1 | grep -oP '[a-f0-9]+(?=\.json)')
          if [ -z "$DATA_HASH" ]; then
            echo "Could not find skills data hash in JS bundle"
            exit 1
          fi
          echo "Found skills hash: $DATA_HASH"

          DATA_URL="https://cloudcache.tencentcs.com/qcloud/tea/app/data/skills.${DATA_HASH}.json?max_age=31536000"
          echo "url=$DATA_URL" >> $GITHUB_OUTPUT
          echo "hash=$DATA_HASH" >> $GITHUB_OUTPUT

      - name: Download latest skills.json
        run: |
          echo "Downloading from: ${{ steps.discover.outputs.url }}"
          curl -fsSL -o skills_new.json "${{ steps.discover.outputs.url }}"
          COUNT=$(python3 -c "import json; d=json.load(open('skills_new.json')); print(len(d.get('skills', d.get('data', []))))")
          echo "Downloaded $COUNT skills"
          if [ "$COUNT" -lt 100 ]; then
            echo "ERROR: Too few skills ($COUNT), aborting"
            exit 1
          fi

      - name: Check for changes
        id: diff
        run: |
          if ! diff -q skills.json skills_new.json > /dev/null 2>&1; then
            echo "changed=true" >> $GITHUB_OUTPUT
            SKILL_COUNT=$(python3 -c "import json; d=json.load(open('skills_new.json')); print(len(d.get('skills', d.get('data', []))))")
            echo "count=$SKILL_COUNT" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update skills.json
        if: steps.diff.outputs.changed == 'true'
        run: mv skills_new.json skills.json

      - name: Update skills hash in HTML files
        if: steps.diff.outputs.changed == 'true'
        run: |
          OLD_HASH=$(grep -oP '(?<=SKILLS_HASH: )[a-f0-9]+' index.html | head -1)
          NEW_HASH="${{ steps.discover.outputs.hash }}"
          if [ "$OLD_HASH" != "$NEW_HASH" ]; then
            echo "Updating hash in HTML: $OLD_HASH -> $NEW_HASH"
            sed -i "s/skills\.${OLD_HASH}\.json/skills.${NEW_HASH}.json/g" index.html all.html
            sed -i "s/SKILLS_HASH: ${OLD_HASH}/SKILLS_HASH: ${NEW_HASH}/g" index.html all.html
          else
            echo "Hash unchanged: $NEW_HASH"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills.json index.html all.html
          git commit -m "chore: sync skills data (${{ steps.diff.outputs.count }} skills, hash=${{ steps.discover.outputs.hash }})"
          git push
